<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="ui-monospace, 'DM Mono', monospace">
  <defs>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#23243440" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="800" height="500" fill="#0d0e16"/>
  <rect x="0" y="0" width="800" height="500" fill="url(#grid3)"/>
  <rect x="20" y="20" width="760" height="460" fill="none" stroke="#5b5d78" stroke-width="3"/>

  <!-- Open-plan office (left 2/3) -->
  <rect x="20" y="20" width="500" height="460" fill="#4fc4cf" fill-opacity="0.04" stroke="#464760" stroke-width="1.5"/>
  <text x="270" y="245" text-anchor="middle" font-size="20" fill="#e2e3ef">Open office</text>
  <text x="270" y="267" text-anchor="middle" font-size="11" fill="#9294ab">420 m² · 48 desks</text>

  <!-- Meeting rooms (right column) -->
  <rect x="520" y="20" width="260" height="150" fill="#ffffff" fill-opacity="0.02" stroke="#464760" stroke-width="1.5"/>
  <text x="650" y="100" text-anchor="middle" font-size="15" fill="#e2e3ef">Meeting 3A</text>
  <rect x="520" y="170" width="260" height="150" fill="#ffffff" fill-opacity="0.02" stroke="#464760" stroke-width="1.5"/>
  <text x="650" y="250" text-anchor="middle" font-size="15" fill="#e2e3ef">Meeting 3B</text>
  <rect x="520" y="320" width="160" height="160" fill="#8b7fd4" fill-opacity="0.06" stroke="#464760" stroke-width="1.5"/>
  <text x="600" y="404" text-anchor="middle" font-size="14" fill="#8b7fd4">Core</text>
  <rect x="680" y="320" width="100" height="160" fill="#ffffff" fill-opacity="0.02" stroke="#464760" stroke-width="1.5"/>
  <text x="730" y="404" text-anchor="middle" font-size="11" fill="#9294ab">WC</text>

  <text x="34" y="44" font-size="11" fill="#555770">PALÁC JIRÁSKOVO · 3F</text>
</svg>
