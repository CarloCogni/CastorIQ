<!--ifc_processor/explore/_tree_nodes.html-->
<!--   Renders spatial tree nodes (universal — works at any level).-->
<!--   Context: nodes (IFCSpatialElement queryset), ifc_file, project -->
{% load ifc_filters %}

{% for node in nodes %}
<li class="mb-1">
  <div class="explore-tree-node d-flex align-items-center justify-content-between"
       id="tree-node-{{ node.pk }}"
       hx-get="{% url 'projects:explore_tree' project.pk ifc_file.pk %}?spatial_id={{ node.pk }}"
       hx-target="#tree-children-{{ node.pk }}"
       hx-swap="innerHTML"
       onclick="exploreFilter(this, '{% url 'projects:explore_entities' project.pk ifc_file.pk %}?spatial_id={{ node.pk }}')"
       >
    <span>
      <i class="bi {{ node.spatial_type|spatial_icon }} me-1 text-secondary"></i>
      {{ node.entity.name|default:"(unnamed)" }}
    </span>
    <span class="badge bg-secondary ms-2" style="font-size:0.7rem;">{{ node.entity_count }}</span>
  </div>
  <ul class="list-unstyled explore-tree-children mb-0" id="tree-children-{{ node.pk }}"></ul>
</li>
{% empty %}
<li class="text-secondary small px-2 py-1 fst-italic">No spatial data available.</li>
{% endfor %}
