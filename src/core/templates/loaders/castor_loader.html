<!--core/loaders/castor_loader.html-->

<!--1-->
<svg class="castor-loader-variant" style="display:none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="50" height="50">
  <defs>
    <linearGradient id="m-crystal-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="m-crystal-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#330867;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="m-wood-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#795548;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#A1887F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D4037;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @keyframes m-bite { 0% { transform: rotate(0deg); } 50% { transform: rotate(15deg); } 100% { transform: rotate(0deg); } }
    @keyframes m-head-shake { 0% { transform: rotate(0deg) translateY(0); } 25% { transform: rotate(-2deg) translateY(1px); } 75% { transform: rotate(1deg) translateY(-1px); } 100% { transform: rotate(0deg) translateY(0); } }
    @keyframes m-debris-fly { 0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); } 100% { opacity: 0; transform: translate(-25px, -35px) scale(0.5) rotate(-90deg); } }
    .m-head-group { transform-origin: 100px 100px; animation: m-head-shake 0.4s infinite linear; }
    .m-jaw { transform-origin: 90px 95px; animation: m-bite 0.2s infinite alternate ease-in-out; }
    .m-chip { opacity: 0; fill: #D7CCC8; }
    .m-c1 { animation: m-debris-fly 0.6s infinite linear; animation-delay: 0.0s; }
    .m-c2 { animation: m-debris-fly 0.6s infinite linear; animation-delay: 0.2s; }
    .m-c3 { animation: m-debris-fly 0.6s infinite linear; animation-delay: 0.4s; }
  </style>
  <g transform="translate(40, 110)">
    <path d="M0,20 L100,10 L100,40 L0,50 Z" fill="url(#m-wood-gradient)" />
    <ellipse cx="0" cy="35" rx="5" ry="15" fill="#5D4037" />
    <path d="M10,0 L110,-10 L110,20 L10,30 Z" fill="url(#m-wood-gradient)" stroke="#3E2723" stroke-width="1"/>
    <ellipse cx="10" cy="15" rx="5" ry="15" fill="#8D6E63" />
  </g>
  <g class="m-head-group">
    <path d="M50,80 L90,80 L90,130 L40,120 Z" fill="url(#m-crystal-shadow)" />
    <g class="m-jaw">
      <path d="M90,95 L140,105 L130,135 L80,125 Z" fill="url(#m-crystal-main)" stroke="#fff" stroke-width="0.5" stroke-opacity="0.3"/>
      <path d="M90,95 L130,135 L100,130 Z" fill="url(#m-crystal-shadow)" opacity="0.6"/>
      <path d="M135,108 L138,100 L142,102 L139,110 Z" fill="#EEE" />
    </g>
    <g>
      <path d="M60,60 L120,55 L150,85 L90,95 Z" fill="url(#m-crystal-main)" />
      <path d="M90,95 L150,85 L140,105 L90,95 Z" fill="url(#m-crystal-highlight)" opacity="0.9"/>
      <path d="M60,60 L90,95 L50,80 Z" fill="url(#m-crystal-shadow)" opacity="0.5" />
      <path d="M150,85 L160,90 L150,95 Z" fill="#1a237e" />
      <circle cx="115" cy="75" r="6" fill="#1a237e" />
      <circle cx="117" cy="73" r="2" fill="white" />
      <circle cx="75" cy="65" r="10" fill="#30cfd0" stroke="#1a237e" stroke-width="2"/>
      <circle cx="75" cy="65" r="5" fill="#1a237e" />
      <rect x="145" y="90" width="8" height="12" fill="white" rx="1" />
    </g>
  </g>
  <g transform="translate(140, 100)">
    <polygon points="0,0 10,-5 5,5" class="m-chip m-c1" />
    <polygon points="0,0 8,8 -5,5"  class="m-chip m-c2" />
    <polygon points="0,0 12,0 6,10" class="m-chip m-c3" />
  </g>
</svg>


<!--2-->
<svg class="castor-loader-variant" style="display:none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="50" height="50">
  <defs>
    <linearGradient id="m-crystal-main-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @keyframes m-chomp-8bit { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(45deg); } }
    @keyframes m-chomp-8bit-bottom { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-45deg); } }
    .m-pixel { shape-rendering: crispEdges; }
    .m-jaw-top { transform-origin: 100px 100px; animation: m-chomp-8bit 0.3s infinite steps(2); }
    .m-jaw-bot { transform-origin: 100px 100px; animation: m-chomp-8bit-bottom 0.3s infinite steps(2); }
  </style>
  <rect x="150" y="90" width="20" height="20" fill="#795548" class="m-pixel" />
  <rect x="180" y="90" width="20" height="20" fill="#5D4037" class="m-pixel" />

  <g class="m-jaw-top">
    <path d="M100,100 L140,60 L60,60 L60,100 Z" fill="url(#m-crystal-main-1)" class="m-pixel" />
    <rect x="80" y="70" width="10" height="10" fill="#000" class="m-pixel" />
    <rect x="130" y="90" width="10" height="10" fill="#FFF" class="m-pixel" />
  </g>
  <g class="m-jaw-bot">
    <path d="M100,100 L140,140 L60,140 L60,100 Z" fill="url(#m-crystal-main-1)" class="m-pixel" />
  </g>
</svg>
