{% load static %}
<!--
  registration/_login_step1.html
  Step 1 of the two-step login: username (which is the email for beta users).
  Wrapped in #login-form-region so HTMX can swap step 1 ↔ step 2 in place.
-->
<form id="login-step1"
      hx-post="{% url 'login_step1' %}"
      hx-target="#login-form-region"
      hx-swap="innerHTML"
      novalidate>
    {% csrf_token %}

    <div class="mb-3">
        <label for="id_username" class="form-label text-white-50 fs-7">Email or username</label>
        {{ form.username }}
        <div class="form-text small text-white-50 mt-2">
            For beta accounts this is the email you applied with.
        </div>
    </div>

    <div class="d-grid gap-3">
        <button type="submit" class="btn btn-castor rounded-3">
            Continue <i class="bi bi-arrow-right ms-1"></i>
        </button>
    </div>
</form>

<div class="mt-4 text-center">
    <a href="{% url 'password_reset' %}" class="text-white-50 text-decoration-none fs-7">Forgot password?</a>
    <div class="mt-2 small text-white-50">
        No account yet? <a href="/" class="text-white-50">Apply on the landing page</a>
    </div>
</div>
