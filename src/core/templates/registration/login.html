{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sign in · CastorIQ</title>

    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="{% static 'core/css/public.css' %}" rel="stylesheet">

    <style>
        /* Page-specific layering: matrix canvas behind, form overlay on top. */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .login-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%);
        }

        /* Glassmorphism card. */
        .castor-card {
            width: 100%;
            max-width: 420px;
            background: rgba(10, 10, 10, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        .castor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: 0.5s;
            pointer-events: none;
        }
        .castor-card:hover::before {
            left: 100%;
            transition: 0.8s ease-in-out;
        }

        /* Inputs in the glass card need a touch more transparency than the
         * shared form-control treatment; override here. */
        .castor-card .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 0.75rem 1rem;
        }
        .castor-card .form-control:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--castor-blue-light);
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.15);
            color: #fff;
        }

        .btn-castor {
            background: linear-gradient(135deg, var(--castor-blue-light), var(--castor-blue-cyan));
            border: none;
            color: #000;
            font-weight: 600;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }
        .btn-castor:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.4);
            color: #000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card-header h1 {
            font-size: 1.6rem;
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body class="castor-public">

    {% include "core/components/_matrix_background.html" %}

    <div class="login-overlay">
        <div class="castor-card">

            <div class="login-card-header text-center mb-4">
                <img src="{% static 'images/castor-logo-nobg.png' %}" alt="CastorIQ" height="72" class="mb-3">
                <h1>
                    <span class="castoriq-wordmark">
                        <span class="cw-prefix">Castor</span><span class="cw-iq">IQ</span>
                    </span>
                    <button type="button"
                            class="help-pill ms-2"
                            data-bs-toggle="modal"
                            data-bs-target="#loginHelpModal"
                            title="How signing in works"
                            aria-label="How signing in works"
                            style="vertical-align: middle;">
                        <i class="bi bi-question-circle"></i>
                    </button>
                </h1>
                <p class="text-white-50 small mb-0">Construction Intelligence Platform</p>
            </div>

            <div id="login-form-region">
                {% include "registration/_login_step1.html" %}
            </div>
        </div>
    </div>

    {% include "registration/_login_help_modal.html" %}

    <!-- Toast container — fired by trigger_toast / HX-Trigger:castor:toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div id="castor-login-toast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="castor-login-toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        // Lightweight toast bridge — login.html doesn't extend base.html so we
        // wire the same `castor:toast` event listener locally.
        document.body.addEventListener('castor:toast', function (evt) {
            const detail = evt.detail || {};
            const toastEl = document.getElementById('castor-login-toast');
            const bodyEl = document.getElementById('castor-login-toast-body');
            if (!toastEl || !bodyEl) return;

            bodyEl.textContent = detail.message || '';
            toastEl.classList.remove('text-bg-success', 'text-bg-danger', 'text-bg-secondary');
            const lvl = (detail.level || 'success').toLowerCase();
            if (lvl === 'error') {
                toastEl.classList.add('text-bg-danger');
            } else if (lvl === 'info') {
                toastEl.classList.add('text-bg-secondary');
            } else {
                toastEl.classList.add('text-bg-success');
            }
            bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 4000 }).show();
        });
    </script>
</body>
</html>
