<!--login.html-->
{% extends "core/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login - Castor{% endblock %}

{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center p-4">
    <div style="width: 100%; max-width: 400px;">
        <!-- Logo and Title -->
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary rounded-3 mb-3" style="width: 64px; height: 64px;">
                <i class="bi bi-building fs-2 text-white"></i>
            </div>
            <h1 class="h3 fw-bold mb-2">Welcome to Castor</h1>
            <p class="text-secondary">Sign in to continue</p>
        </div>

        <!-- Login Card -->
        <div class="card bg-surface border">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <div>Invalid username or password.</div>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text"
                               name="username"
                               id="id_username"
                               class="form-control"
                               required
                               autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label">Password</label>
                        <input type="password"
                               name="password"
                               id="id_password"
                               class="form-control"
                               required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
