<!--base.html-->
{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Castor{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- base.html <head> — ADD after the Bootstrap Icons <link> -->

    <!-- Quill.js Rich Text Editor -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

    <style>
        :root {
            --castor-primary: #3b82f6;
            --castor-primary-hover: #2563eb;
            --castor-accent: #8b5cf6;
            --castor-facilities: #14b8a6;
            --castor-success: #10b981;
            --castor-warning: #f59e0b;
            --castor-danger: #ef4444;
        }

        [data-bs-theme="dark"] {
            --bs-body-bg: #0f0f0f;
            --bs-tertiary-bg: #1a1a1a;
            --bs-border-color: #2a2a2a;
            --bs-primary: var(--castor-primary);
            --bs-primary-rgb: 59, 130, 246;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bs-border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--bs-secondary-color);
        }

        /* Override Bootstrap primary color */
        .btn-primary {
            --bs-btn-bg: var(--castor-primary);
            --bs-btn-border-color: var(--castor-primary);
            --bs-btn-hover-bg: var(--castor-primary-hover);
            --bs-btn-hover-border-color: var(--castor-primary-hover);
            --bs-btn-active-bg: var(--castor-primary-hover);
            --bs-btn-active-border-color: var(--castor-primary-hover);
        }

        .bg-primary {
            background-color: var(--castor-primary) !important;
        }

        .text-primary {
            color: var(--castor-primary) !important;
        }

        /* Accent color */
        .text-accent {
            color: var(--castor-accent) !important;
        }

        .bg-accent {
            background-color: var(--castor-accent) !important;
        }

        /* Surface backgrounds */
        .bg-surface {
            background-color: var(--bs-tertiary-bg) !important;
        }

        /* 1. Sidebar collapse chevron */
        [data-bs-toggle="collapse"] .bi-chevron-down {
            transition: transform 0.2s ease;
        }
        [data-bs-toggle="collapse"].collapsed .bi-chevron-down {
            transform: rotate(-90deg);
        }

        /* 2. Sidebar Transitions */
        .sidebar {
            width: 280px;
            height: 100%;
            background-color: var(--bs-tertiary-bg);
            border-right: 1px solid var(--bs-border-color);
            transition: margin-left 0.3s ease-in-out; /* Smooth slide */
            flex-shrink: 0;
        }

        /* Class to hide sidebar by pulling it left */
        .sidebar-collapsed {
            margin-left: -280px;
        }

        /* 2. File Links in Sidebar */
        .file-link {
            color: inherit;
            text-decoration: none;
        }
        .file-link:hover {
            color: var(--castor-primary);
            text-decoration: underline;
        }

        /* 3. Scroll to Bottom Button */
        .scroll-bottom-btn {
            position: absolute;
            bottom: 80px; /* Above the input bar */
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bs-tertiary-bg);
            border: 1px solid var(--bs-border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .scroll-bottom-btn.visible {
            opacity: 1;
            visibility: visible;
            bottom: 90px; /* Slight pop-up animation */
        }

        .scroll-bottom-btn.has-new {
            background-color: var(--castor-primary);
            border-color: var(--castor-primary);
            animation: scroll-btn-pulse 1.5s ease-in-out infinite;
        }
        .scroll-bottom-btn.has-new i {
            color: white !important;
        }
        @keyframes scroll-btn-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
        }
        @keyframes context-bar-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }
        .context-bar-pulse {
            animation: context-bar-pulse 2s ease-in-out infinite;
        }

        .scroll-bottom-btn:hover {
            background-color: var(--castor-primary);
            color: white;
            border-color: var(--castor-primary);
        }

        /* Nav tabs custom style */
        .nav-tabs-custom {
            border-bottom: 1px solid var(--bs-border-color);
            background-color: var(--bs-tertiary-bg);
            padding: 0.75rem 1rem;
            gap: 0.25rem;
        }

        .nav-tabs-custom .nav-link {
            border: none;
            border-radius: 0.5rem;
            padding: 0.625rem 1rem;
            color: var(--bs-secondary-color);
            font-weight: 500;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-tabs-custom .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--bs-body-color);
        }

        .nav-tabs-custom .nav-link.active {
            background-color: var(--castor-primary);
            color: white;
        }

        /* File list items */
        .file-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        .file-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .file-icon {
            width: 32px;
            height: 32px;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .file-icon-ifc {
            background-color: rgba(139, 92, 246, 0.15);
            color: var(--castor-accent);
        }

        .file-icon-pdf {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--castor-danger);
        }

        .file-icon-docx {
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--castor-primary);
        }

        /* Status indicators */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-pending { background-color: var(--castor-warning); }
        .status-processing { background-color: var(--castor-primary); }
        .status-completed { background-color: var(--castor-success); }
        .status-failed { background-color: var(--castor-danger); }

        /* Chat styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 80%;
            margin-bottom: 1rem;
        }

        .message-user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message-user .message-avatar {
            background-color: var(--castor-primary);
            color: white;
        }

        .message-assistant .message-avatar {
            background-color: var(--castor-accent);
            color: white;
        }

        .message-content {
            background-color: var(--bs-tertiary-bg);
            border: 1px solid var(--bs-border-color);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            min-width: 0;
            overflow: hidden;
        }

        .message-user .message-content {
            background-color: var(--castor-primary);
            border-color: var(--castor-primary);
            color: white;
        }

        .chat-input-container {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--bs-border-color);
            background-color: var(--bs-tertiary-bg);
        }

        /* Proposal card */
        .proposal-card {
            border: 1px solid var(--castor-accent);
            border-radius: 0.75rem;
            overflow: hidden;
            margin-top: 0.75rem;
        }

        .proposal-header {
            background-color: rgba(139, 92, 246, 0.1);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--bs-border-color);
        }

        .proposal-diff {
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 0.75rem;
            background-color: var(--bs-body-bg);
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin: 0.75rem 0;
            overflow-x: auto;
        }

        /* Project cards */
        .project-card {
            background-color: var(--bs-tertiary-bg);
            border: 1px solid var(--bs-border-color);
            border-radius: 0.75rem;
            padding: 1.25rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.15s ease;
            display: block;
        }

        .project-card:hover {
            border-color: var(--castor-primary);
            transform: translateY(-2px);
            color: inherit;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--bs-secondary-color);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Navbar brand */
        .navbar-brand-castor {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .navbar-brand-castor .brand-icon {
            width: 32px;
            height: 32px;
            background-color: var(--castor-primary);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed var(--bs-border-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .upload-zone:hover {
            border-color: var(--castor-primary);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .upload-zone.dragover {
            border-color: var(--castor-primary);
            background-color: rgba(59, 130, 246, 0.1);
        }

        /* Badge for conflict count */
        .badge-conflicts {
            background-color: var(--castor-danger);
            font-size: 0.6875rem;
        }

        /* Utility classes */
        .fs-7 { font-size: 0.875rem; }
        .fs-8 { font-size: 0.75rem; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        /* Quill dark-theme overrides */
        .ql-toolbar.ql-snow {
            border-color: var(--bs-border-color) !important;
            background-color: var(--bs-tertiary-bg);
        }
        .ql-container.ql-snow {
            border-color: var(--bs-border-color) !important;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: var(--bs-body-color);
        }
        .ql-editor.ql-blank::before {
            color: var(--bs-secondary-color);
            font-style: normal;
        }
        .ql-snow .ql-stroke { stroke: var(--bs-secondary-color); }
        .ql-snow .ql-fill { fill: var(--bs-secondary-color); }
        .ql-snow .ql-picker-label { color: var(--bs-secondary-color); }


        /* 1. Only show the 3-dots menu when hovering the file row */
        .group:hover .group-hover-opacity {
            opacity: 1 !important;
        }
        .transition-opacity {
            transition: opacity 0.2s ease;
        }

        /* 2. Better text colors */
        .text-white-50 { color: rgba(255, 255, 255, 0.6) !important; }
        .hover-text-white:hover { color: #fff !important; text-decoration: none; }
        .hover-white:hover { color: #fff !important; }

        /* 3. Tweak the file icon to pop less visually */
        .file-icon {
            /* Slight background adjustment */
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .min-width-0 {
            min-width: 0 !important;
        }
        .min-height-0 {
            min-height: 0 !important;
        }
        /* 1. Truncation Logic */
        .text-clamp-4 {
            display: -webkit-box;
            -webkit-line-clamp: 4; /* Show max 4 lines */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 2. Copy Button Visibility */
        .message-content {
            position: relative; /* Anchor for absolute buttons */
            padding-right: 30px; /* Make space for the copy button */
        }

        .btn-copy-msg {
            position: absolute;
            top: 8px;
            right: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
            padding: 4px;
            border-radius: 4px;
            background-color: rgba(0,0,0,0.2);
            color: inherit;
            border: none;
            cursor: pointer;
        }

        /* Show copy button on hover */
        .message-content:hover .btn-copy-msg {
            opacity: 1;
        }

        /* 3. Expand/Collapse Toggle */
        .expand-toggle {
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            opacity: 0.9;
        }

        .expand-toggle:hover {
            text-decoration: underline;
            opacity: 1;
        }
        /* Scope pills: color-coded active states */
        #scope-auto:checked + label {
            background-color: rgba(16, 185, 129, 0.15) !important;
            color: var(--castor-success) !important;
            font-weight: 600;
        }

        #scope-ifc:checked + label {
            background-color: rgba(139, 92, 246, 0.15) !important;
            color: var(--castor-accent) !important;
            font-weight: 600;
        }

        #scope-docs:checked + label {
            background-color: rgba(59, 130, 246, 0.15) !important;
            color: var(--castor-primary) !important;
            font-weight: 600;
        }
        /* Source badges: interactive states */
        .source-badge {
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .source-badge:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .source-badge-active {
            outline: 2px solid currentColor;
            outline-offset: 1px;
        }

        /* Source detail card entrance */
        .source-detail {
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Mode-colored active tabs */
        .nav-tabs-custom .nav-link.active.tab-ask {
            background-color: var(--castor-primary);
        }

        .nav-tabs-custom .nav-link.active.tab-modify {
            background-color: var(--castor-accent);
        }

        .nav-tabs-custom .nav-link.active.tab-facilities {
            background-color: var(--castor-facilities);
        }

        /* Conversation mode indicators */
        .conversation-indicator {
            width: 3px;
            border-radius: 2px;
            flex-shrink: 0;
            align-self: stretch;
        }

        .indicator-ask { background-color: var(--castor-primary); }
        .indicator-modify { background-color: var(--castor-accent); }

        .mode-label {
            font-size: 0.625rem;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mode-label-ask {
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--castor-primary);
        }

        .mode-label-modify {
            background-color: rgba(139, 92, 246, 0.15);
            color: var(--castor-accent);
        }

        /* AI Markdown Typography Fixes */
        .message-text pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-size: 0.875rem;
            margin: 0.75rem 0;
        }

        .message-text code {
            background-color: rgba(0, 0, 0, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: monospace;
        }

        .message-text pre code {
            background-color: transparent;
            padding: 0;
        }

        .message-text table {
            width: 100%;
            margin-bottom: 1rem;
            border-collapse: collapse;
        }

        .message-text th, .message-text td {
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 0.5rem;
        }

        /* ──────────────────────────────────────────────────────────────────
           Universal "?" help pill — tiny button next to any page heading that
           opens a Bootstrap modal explaining the page. Every meaningful tab
           (Assets, Work, Permits, Requests, …) should have one. Tint picks up
           from `--castor-*` so Facilities pages (teal), Ask (blue), Modify
           (purple) each get the right accent by setting --help-accent on a
           parent element. Defaults to --castor-primary.

           Usage (next to the heading):
             <button class="help-pill" data-bs-toggle="modal"
                     data-bs-target="#xHelpModal"
                     title="How this page works"
                     aria-label="How this page works">
                 <i class="bi bi-question-circle"></i>
             </button>
           ────────────────────────────────────────────────────────────────── */
        .help-pill {
            --help-accent: var(--castor-primary);
            background: transparent;
            border: 1px dashed rgba(0, 0, 0, 0.001);
            border-color: color-mix(in srgb, var(--help-accent) 35%, transparent);
            color: var(--help-accent);
            font-size: 0.8125rem;
            line-height: 1;
            border-radius: 999px;
            padding: 0.25rem 0.5rem;
            transition: all 0.15s ease;
            opacity: 0.85;
            cursor: pointer;
        }
        .help-pill:hover, .help-pill:focus-visible {
            background-color: color-mix(in srgb, var(--help-accent) 8%, transparent);
            border-style: solid;
            color: var(--help-accent);
            opacity: 1;
            outline: none;
        }
        /* Facilities (teal) and Modify (purple) accents — scope by placing the
           class on a container. For Facilities pages, the subnav wrapper can
           set --help-accent: var(--castor-facilities); alternatively the
           button itself can be given an inline style. */
        .facilities-scope { --help-accent: var(--castor-facilities); }
        .modify-scope { --help-accent: var(--castor-accent); }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}
    <div class="d-flex flex-column vh-100">
        {% include "core/components/navbar.html" %}
        <div class="d-flex flex-grow-1 overflow-hidden">
            {% block content %}{% endblock %}
        </div>
    </div>
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        // Initialize all tooltips
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl, {
                trigger: 'hover', // Only trigger on hover
                container: 'body' // CRITICAL: This allows it to float outside the sidebar
            })
        })
    });
    </script>

    <!--
        Global toast primitive. Any HTMX endpoint can fire a toast by
        returning an HX-Trigger header. Use the helpers in core.http:
            from core.http import trigger_toast, toast_response
            return trigger_toast(response, "Saved", "success")
            return toast_response("Permission denied", "error", status=403)
        For redirect-based views, use django.contrib.messages — the bridge
        below converts each message into a toast on page load.
        Levels: "success" (green) / "error" (red) / "info" (secondary).
    -->
    <div id="castor-toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;"></div>
    <template id="castor-toast-template">
        <div class="toast align-items-center border-0" role="alert" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </template>
    <script>
    document.body.addEventListener('castor:toast', function (e) {
        var d = e.detail || {};
        var level = d.level || 'success';
        var bg = level === 'error' ? 'bg-danger'
               : level === 'info'  ? 'bg-secondary'
               :                     'bg-success';
        var tpl = document.getElementById('castor-toast-template').content.cloneNode(true);
        var el = tpl.firstElementChild;
        el.classList.add(bg, 'text-white');
        el.querySelector('.toast-body').textContent = d.message || 'Saved';
        var container = document.getElementById('castor-toast-container');
        container.appendChild(el);
        var t = new bootstrap.Toast(el, { delay: level === 'error' ? 5000 : 2500 });
        t.show();
        el.addEventListener('hidden.bs.toast', function () { el.remove(); });
    });
    </script>
    {% if messages %}
    <script id="castor-messages-bridge" type="application/json">
        [{% for m in messages %}{"tags": "{{ m.tags|default:'info'|escapejs }}", "message": "{{ m.message|escapejs }}"}{% if not forloop.last %},{% endif %}{% endfor %}]
    </script>
    <script>
    (function () {
        var node = document.getElementById('castor-messages-bridge');
        if (!node) return;
        var msgs;
        try { msgs = JSON.parse(node.textContent); } catch (_) { return; }
        msgs.forEach(function (m) {
            var tags = (m.tags || '').toLowerCase();
            var lvl = tags.indexOf('error') >= 0 || tags.indexOf('warning') >= 0 ? 'error'
                    : tags.indexOf('success') >= 0 ? 'success'
                    : 'info';
            document.body.dispatchEvent(new CustomEvent('castor:toast', {
                detail: {level: lvl, message: m.message}
            }));
        });
    })();
    </script>
    {% endif %}

    {% block extra_js %}{% endblock %}
</body>
</html>
