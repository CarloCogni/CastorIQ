<!-- scheduling/components/link_search.html — entity typeahead results -->
{% if entities %}
<div class="list-group list-group-flush border rounded mt-1" style="font-size:0.8rem; max-height:160px; overflow-y:auto;">
    {% for entity in entities %}
    <form hx-post="{% url 'islam:link_change' project.pk feedback_pk %}"
          hx-target="#link-row-{{ feedback_pk }}"
          hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="entity_id" value="{{ entity.pk }}">
        <button type="submit"
                class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-1 px-2 border-0">
            <span>{{ entity.name|default:entity.global_id|truncatechars:40 }}</span>
            <small class="text-secondary ms-2 flex-shrink-0">{{ entity.ifc_type }}</small>
        </button>
    </form>
    {% endfor %}
</div>
{% elif request.GET.q %}
<div class="text-secondary small mt-1 ps-1">No entities match "{{ request.GET.q }}".</div>
{% endif %}
