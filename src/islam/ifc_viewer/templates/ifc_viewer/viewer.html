<!-- ifc_viewer/viewer.html — 3D IFC viewer, @thatopen/components v2 -->
{% load static %}
<div class="d-flex flex-column h-100 position-relative" id="ifc-viewer-root">

    {% if not ifc_file_url %}
    <!-- No IFC file state -->
    <div class="d-flex flex-column align-items-center justify-content-center h-100 text-secondary">
        <i class="bi bi-box fs-1 mb-3"></i>
        <p class="mb-1 fw-semibold">No processed IFC file</p>
        <p class="small">Upload and process an IFC file from the project settings to enable the 3D viewer.</p>
    </div>

    {% else %}
    <!-- Toolbar -->
    <div class="d-flex align-items-center px-3 py-2 border-bottom bg-body flex-shrink-0" style="gap:0.5rem; font-size:0.82rem;">
        <span class="text-secondary">{{ viewer_ifc_file.name }}</span>
        <div class="ms-auto d-flex gap-2">
            <button class="btn btn-sm btn-outline-secondary" id="viewer-reset-btn" title="Reset camera">
                <i class="bi bi-aspect-ratio"></i> Reset
            </button>
        </div>
    </div>

    <!-- Viewer container — v2 SimpleRenderer creates its own canvas inside this div -->
    <div class="flex-grow-1 position-relative overflow-hidden bg-dark">
        <div id="ifc-container" style="width:100%; height:100%; position:relative;"></div>

        <!-- Loading overlay -->
        <div id="viewer-loading" class="position-absolute top-0 start-0 w-100 h-100 d-flex flex-column align-items-center justify-content-center bg-dark text-light" style="z-index:10;">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <span id="viewer-loading-msg">Loading IFC model…</span>
        </div>

        <!-- Error overlay -->
        <div id="viewer-error" class="position-absolute top-0 start-0 w-100 h-100 d-flex flex-column align-items-center justify-content-center bg-dark text-danger d-none" style="z-index:10;">
            <i class="bi bi-exclamation-triangle fs-1 mb-2"></i>
            <span id="viewer-error-msg">Failed to load model.</span>
        </div>

        <!-- Simulation legend (hidden until simulate mode active) -->
        <div id="sim-legend" class="position-absolute bottom-0 start-0 m-3 p-2 rounded bg-dark bg-opacity-75 text-light d-none" style="font-size:0.78rem; z-index:5;">
            <div class="d-flex align-items-center gap-2 mb-1"><span style="width:12px;height:12px;border-radius:2px;background:#22c55e;display:inline-block;"></span> Active</div>
            <div class="d-flex align-items-center gap-2 mb-1"><span style="width:12px;height:12px;border-radius:2px;background:#3b82f6;display:inline-block;"></span> Complete</div>
            <div class="d-flex align-items-center gap-2 mb-1"><span style="width:12px;height:12px;border-radius:2px;background:#94a3b8;display:inline-block;"></span> Pending</div>
            <div class="d-flex align-items-center gap-2"><span style="width:12px;height:12px;border-radius:2px;background:#f59e0b;display:inline-block;"></span> Delayed</div>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "{% static 'vendor/three/build/three.module.js' %}",
        "@thatopen/fragments": "{% static 'vendor/thatopen-fragments/dist/index.min.mjs' %}",
        "web-ifc": "{% static 'vendor/web-ifc/web-ifc-api.js' %}?v=2"
      }
    }
    </script>
    <script type="module">
    import * as OBC from "{% static 'vendor/thatopen-components/dist/index.min.mjs' %}";

    const IFC_URL   = "{{ ifc_file_url }}";
    const FRAG_URL  = "{% url 'islam:viewer_fragments' project.pk %}";
    const CSRF_TOKEN = "{{ csrf_token }}";
    const container = document.getElementById("ifc-container");
    const loading   = document.getElementById("viewer-loading");
    const loadMsg   = document.getElementById("viewer-loading-msg");
    const errBox    = document.getElementById("viewer-error");
    const errMsg    = document.getElementById("viewer-error-msg");
    const legend    = document.getElementById("sim-legend");

    // Status colours as plain {r,g,b} in [0-1] — Fragment.setColor reads
    // .r/.g/.b directly via InstancedBufferAttribute.setXYZ; no THREE import needed.
    const C = {
        active:    { r: 0.133, g: 0.773, b: 0.369 },  // #22c55e
        complete:  { r: 0.231, g: 0.510, b: 0.965 },  // #3b82f6
        pending:   { r: 0.580, g: 0.639, b: 0.722 },  // #94a3b8
        delayed:   { r: 0.961, g: 0.620, b: 0.043 },  // #f59e0b
        highlight: { r: 1.000, g: 0.863, b: 0.000 },  // #ffdc00
    };

    let world = null;
    let model = null;               // FragmentsGroup returned by IfcLoader
    const globalIdIndex = new Map(); // GlobalId string → expressId number
    const fragmentIndex = new Map(); // expressId number → Fragment

    // ── 1. Init ──────────────────────────────────────────────────────────────

    async function init() {
        try {
            loadMsg.textContent = "Initialising renderer…";
            const components = new OBC.Components();

            const worlds = components.get(OBC.Worlds);
            world = worlds.create();
            world.scene    = new OBC.SimpleScene(components);
            world.renderer = new OBC.SimpleRenderer(components, container);
            world.camera   = new OBC.SimpleCamera(components);
            components.init();
            world.scene.setup();  // adds ambient + directional lights

            // ── Try fragment cache (fast path — skips WASM entirely) ──────
            loadMsg.textContent = "Checking geometry cache…";
            const fragResp = await fetch(FRAG_URL);

            if (fragResp.ok) {
                loadMsg.textContent = "Loading cached model…";
                const fragData = new Uint8Array(await fragResp.arrayBuffer());
                const fragmentsManager = components.get(OBC.FragmentsManager);
                model = fragmentsManager.load(fragData);
                world.scene.three.add(model);
            } else {
                // ── Slow path: parse raw IFC, then save cache ──────────────
                loadMsg.textContent = "Initialising WASM…";
                const ifcLoader = components.get(OBC.IfcLoader);
                ifcLoader.settings.wasm = {
                    path: "{% static 'vendor/web-ifc/' %}",
                    absolute: true,
                };
                await ifcLoader.setup();

                loadMsg.textContent = "Fetching IFC file…";
                const resp = await fetch(IFC_URL);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                loadMsg.textContent = "Parsing IFC model…";
                const data = new Uint8Array(await resp.arrayBuffer());
                model = await ifcLoader.load(data);
                world.scene.three.add(model);

                // Fire-and-forget — model is already visible before this resolves
                _saveFragments(components, model);
            }

            loading.classList.add("d-none");
            buildIndex();

        } catch (err) {
            console.error("IFC viewer init failed:", err);
            loading.classList.add("d-none");
            errMsg.textContent = `Failed to load model: ${err.message}`;
            errBox.classList.remove("d-none");
        }
    }

    // ── 1b. Fragment cache save (fire-and-forget after slow-path parse) ──────

    async function _saveFragments(components, model) {
        try {
            const fragmentsManager = components.get(OBC.FragmentsManager);
            const fragBinary = fragmentsManager.export(model);
            const resp = await fetch(FRAG_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/octet-stream",
                    "X-CSRFToken": CSRF_TOKEN,
                },
                body: fragBinary,
            });
            if (resp.ok) {
                console.log("[viewer] Fragment cache saved (" + fragBinary.byteLength + " bytes).");
            } else {
                console.warn("[viewer] Fragment cache POST returned", resp.status);
            }
        } catch (e) {
            console.warn("[viewer] Fragment cache save failed:", e);
        }
    }

    // ── 2. GlobalId index ─────────────────────────────────────────────────────
    // FragmentsGroup.items → Fragment[]
    // Fragment.ids         → Set<expressId>
    // FragmentsGroup.getLocalProperties(expressId) → raw IFC property map

    function buildIndex() {
        if (!model) return;
        try {
            for (const fragment of model.items) {
                for (const expressId of fragment.ids) {
                    fragmentIndex.set(expressId, fragment);
                    const props = model.getLocalProperties(expressId);
                    const gid = props?.GlobalId?.value;
                    if (gid) globalIdIndex.set(gid, expressId);
                }
            }
        } catch (e) {
            console.warn("GlobalId index build failed:", e);
        }
    }

    // ── 3. Colour helpers ─────────────────────────────────────────────────────

    function colorByGlobalIds(globalIds, color) {
        for (const gid of globalIds) {
            const expressId = globalIdIndex.get(gid);
            if (expressId === undefined) continue;
            const fragment = fragmentIndex.get(expressId);
            if (!fragment) continue;
            // Fragment.setColor(itemIDs: Iterable<number>, color: {r,g,b})
            fragment.setColor([expressId], color);
        }
    }

    function resetAllColors() {
        if (!model) return;
        for (const fragment of model.items) {
            fragment.resetColor();
        }
    }

    // ── 4. TimeLiner events ───────────────────────────────────────────────────

    document.addEventListener("castor:highlight", (e) => {
        if (!model) return;
        const { globalIds = [] } = e.detail || {};
        colorByGlobalIds(globalIds, C.highlight);
    });

    document.addEventListener("castor:simulate", (e) => {
        if (!model) return;
        legend.classList.remove("d-none");
        const { active = [], complete = [], pending = [], delayed = [] } = e.detail || {};
        resetAllColors();
        colorByGlobalIds(active,   C.active);
        colorByGlobalIds(complete, C.complete);
        colorByGlobalIds(pending,  C.pending);
        colorByGlobalIds(delayed,  C.delayed);
    });

    // ── 5. Toolbar ────────────────────────────────────────────────────────────

    document.getElementById("viewer-reset-btn")?.addEventListener("click", () => {
        world?.camera?.controls?.setLookAt(10, 10, 10, 0, 0, 0, true);
        legend.classList.add("d-none");
        resetAllColors();
    });

    init();
    </script>
    {% endif %}

</div>
