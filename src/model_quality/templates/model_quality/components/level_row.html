<!-- ifc_insights/components/level_row.html — one row in the levels table -->

<tr id="level-row-{{ level.pk }}">
    <td class="ps-3 py-2" style="width:40%;">
        <span class="level-display-name">{{ level.name }}</span>
        <input type="text" class="form-control form-control-sm level-edit-name d-none"
               value="{{ level.name }}" style="max-width:200px;">
    </td>
    <td class="py-2" style="width:25%;">
        <span class="level-display-z">{{ level.z_elevation|floatformat:0 }} mm</span>
        <input type="number" step="any" class="form-control form-control-sm level-edit-z d-none"
               value="{{ level.z_elevation }}" style="max-width:120px;">
    </td>
    <td class="py-2" style="width:20%;">
        {% if level.source == 'ifc' %}
            <span class="badge text-bg-secondary">From IFC</span>
        {% elif level.source == 'suggested' %}
            <span class="badge text-bg-warning text-dark">Suggested</span>
        {% else %}
            <span class="badge text-bg-info text-dark">Manual</span>
        {% endif %}
    </td>
    <td class="py-2 pe-3 text-end" style="width:15%;">
        <!-- Display-mode buttons -->
        <div class="level-display-actions d-flex justify-content-end gap-1">
            <button class="btn btn-link btn-sm text-secondary p-1"
                    title="Edit"
                    onclick="levelEditStart('{{ level.pk }}')">
                <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-link btn-sm text-danger p-1"
                    title="Delete"
                    hx-delete="{% url 'model_quality:level_delete' project.pk level.pk %}"
                    hx-target="#level-row-{{ level.pk }}"
                    hx-swap="outerHTML"
                    hx-confirm="Delete level '{{ level.name }}'?">
                <i class="bi bi-trash"></i>
            </button>
        </div>
        <!-- Edit-mode buttons -->
        <div class="level-edit-actions d-none d-flex justify-content-end gap-1">
            <button class="btn btn-link btn-sm text-success p-1"
                    title="Save"
                    onclick="levelEditSave('{{ level.pk }}', '{% url 'model_quality:level_edit' project.pk level.pk %}')">
                <i class="bi bi-check-lg"></i>
            </button>
            <button class="btn btn-link btn-sm text-secondary p-1"
                    title="Cancel"
                    onclick="levelEditCancel('{{ level.pk }}')">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </td>
</tr>
