<!-- environments/partials/_role_form.html -->
<!-- Lives inside #assignRoleModal. Same vanilla-JS typeahead as
     _member_form.html — see people.html for the search handler. -->
<form id="role-add-form"
      hx-post="{% url 'projects:role_add' project.pk %}"
      hx-swap="none"
      hx-on::after-request="routeRoleAddResponse(event);">
    {% csrf_token %}
    <div class="mb-3 position-relative">
        <label class="form-label small text-secondary mb-1" for="role-user-search">User</label>
        <input type="text"
               id="role-user-search"
               class="form-control form-control-sm user-typeahead"
               placeholder="Search username or email…"
               autocomplete="off"
               data-search-url="{% url 'projects:user_search' project.pk %}"
               data-scope="role"
               data-suggestions-id="role-user-suggestions"
               data-hidden-id="role-user-id">
        <input type="hidden" id="role-user-id" name="user_id">
        <div id="role-user-suggestions"
             class="list-group position-absolute w-100 mt-1 bg-body border rounded shadow d-none"
             style="z-index: 1060; max-height: 240px; overflow-y: auto;"></div>
    </div>
    <div class="row g-2 mb-3">
        <div class="col-md-6">
            <label class="form-label small text-secondary mb-1" for="role-role">Functional role</label>
            <select id="role-role" name="role" class="form-select form-select-sm" required>
                <option value="">—</option>
                {% for value, label in role_choices %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label small text-secondary mb-1" for="role-valid-from">Valid from</label>
            <input type="date" id="role-valid-from" name="valid_from" class="form-control form-control-sm">
        </div>
        <div class="col-md-3">
            <label class="form-label small text-secondary mb-1" for="role-valid-until">Valid until</label>
            <input type="date" id="role-valid-until" name="valid_until" class="form-control form-control-sm">
        </div>
    </div>
    <div id="role-add-result"></div>
    <div class="form-text small">
        Any system user can receive a role — membership is not required. Leave
        <em>Valid until</em> blank for an open-ended assignment.
    </div>
    <div class="d-flex justify-content-end gap-2 mt-3 pt-3 border-top">
        <button type="button" class="btn btn-sm btn-link text-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-sm" style="background-color: #14b8a6; color: white;">
            <i class="bi bi-plus-lg me-1"></i>Assign role
        </button>
    </div>
</form>
