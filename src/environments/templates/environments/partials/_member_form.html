<!-- environments/partials/_member_form.html -->
<!--
  Lives inside #addMemberModal. The search input is plain JS + fetch (see
  people.html #user-typeahead-js) — no HTMX magic. HTMX is still used for the
  form submit itself (hx-post on the <form>). Data attributes on the input
  tell the JS helper which endpoint and scope to use.
-->
<form id="member-add-form"
      hx-post="{% url 'projects:member_add' project.pk %}"
      hx-swap="none"
      hx-on::after-request="routeMemberAddResponse(event);">
    {% csrf_token %}
    <div class="mb-3 position-relative">
        <label class="form-label small text-secondary mb-1" for="member-user-search">User</label>
        <input type="text"
               id="member-user-search"
               class="form-control form-control-sm user-typeahead"
               placeholder="Search username or email…"
               autocomplete="off"
               data-search-url="{% url 'projects:user_search' project.pk %}"
               data-scope="member"
               data-suggestions-id="member-user-suggestions"
               data-hidden-id="member-user-id">
        <input type="hidden" id="member-user-id" name="user_id">
        <div id="member-user-suggestions"
             class="list-group position-absolute w-100 mt-1 bg-body border rounded shadow d-none"
             style="z-index: 1060; max-height: 240px; overflow-y: auto;"></div>
    </div>
    <div class="mb-3">
        <label class="form-label small text-secondary mb-1" for="new-member-permission">Permission</label>
        <select id="new-member-permission" name="permission" class="form-select form-select-sm">
            {% for value, label in permission_choices %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div id="member-add-result"></div>
    <div class="d-flex justify-content-end gap-2 mt-3 pt-3 border-top">
        <button type="button" class="btn btn-sm btn-link text-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-sm btn-primary">
            <i class="bi bi-person-plus me-1"></i>Add member
        </button>
    </div>
</form>
