<!--_ask.html-->
{% load static %}

<div class="d-flex flex-column flex-grow-1 w-100 h-100 position-relative" style="overflow: hidden;">

    <div class="flex-grow-1 overflow-y-auto p-4 min-height-0" id="chat-messages" style="scroll-behavior: smooth;">
        {% include "environments/components/chat_message_list.html" %}
    </div>

    <div id="scroll-btn" class="scroll-bottom-btn" onclick="scrollToBottom()">
        <i class="bi bi-arrow-down text-secondary"></i>
    </div>

    <div class="chat-input-container flex-shrink-0 border-top bg-surface p-3">
        <form id="ask-form"
          method="post"
          hx-post="{% url 'projects:ask_session' project.pk session.pk %}"
          hx-target="#chat-messages"
          hx-swap="innerHTML">

            {% csrf_token %}

            <div class="input-group">
                <textarea class="form-control"
                          name="message"
                          id="user-input"
                          placeholder="Ask about your IFC model or documents..."
                          rows="1"
                          style="resize: none; max-height: 150px;"
                          required
                          onkeydown="handleEnter(event)"
                          oninput="autoGrow(this)">
                </textarea>

                <button type="submit" class="btn btn-primary" id="send-btn">
                    <i class="bi bi-send"></i>
                </button>
            </div>

            <!-- Scope: subtle, below the input, feels optional -->
            <div class="d-flex align-items-center gap-2 mt-2">
                <span class="text-secondary fs-8">Search in:</span>

                <input type="radio" class="btn-check" name="scope" id="scope-auto" value="auto" checked>
                <label class="btn btn-outline-secondary rounded-pill border-0 fs-8 py-0 px-2"
                       for="scope-auto"
                       data-bs-toggle="tooltip"
                       data-bs-placement="top"
                       data-bs-title="Search across both IFC models and documents automatically">
                    <i class="bi bi-stars me-1" style="color: var(--castor-success);"></i>Auto
                </label>

                <input type="radio" class="btn-check" name="scope" id="scope-ifc" value="ifc">
                <label class="btn btn-outline-secondary rounded-pill border-0 fs-8 py-0 px-2"
                       for="scope-ifc"
                       data-bs-toggle="tooltip"
                       data-bs-placement="top"
                       data-bs-title="Only search IFC model entities (walls, doors, properties...)">
                    <i class="bi bi-box me-1" style="color: var(--castor-accent);"></i>Model
                </label>

                <input type="radio" class="btn-check" name="scope" id="scope-docs" value="docs">
                <label class="btn btn-outline-secondary rounded-pill border-0 fs-8 py-0 px-2"
                       for="scope-docs"
                       data-bs-toggle="tooltip"
                       data-bs-placement="top"
                       data-bs-title="Only search uploaded documents (PDF, DOCX)">
                    <i class="bi bi-file-text me-1" style="color: var(--castor-primary);"></i>Docs
                </label>
            </div>
        </form>
    </div>
</div>

<script>

    (function() {
        const chatContainer = document.getElementById('chat-messages');
        const scrollBtn = document.getElementById('scroll-btn');
        const form = document.getElementById('ask-form');
        const input = document.getElementById('user-input');

        // --- Scroll Logic ---

        // 1. Function to Scroll to Bottom
        window.scrollToBottom = function() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 2. Initial Scroll
        scrollToBottom();

        // 3. Toggle Scroll Button Visibility
        chatContainer.addEventListener('scroll', function() {
            // If user is scrolled up more than 100px from bottom, show button
            const distanceToBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight;

            if (distanceToBottom > 150) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        });

        // --- Chat Interaction Logic (HTMX) ---
        window.handleEnter = function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                htmx.trigger(form, 'submit');
            }
        };

        // 4. Optimistic UI: Show message immediately before server responds
        form.addEventListener('htmx:beforeRequest', function() {
            const text = input.value.trim();
            if (!text) return;

            // Generate optimistic HTML
            const userAvatar = '{{ user.username.0|upper }}';

            // REFACTORED: Use the global CastorLoader
            const loaderHTML = CastorLoader.getHTML();

            const optimisticHTML = `
                    <div class="message message-user">
                        <div class="message-avatar">${userAvatar}</div>
                        <div class="message-content">${text.replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="message message-assistant">
                        <div class="message-avatar"><i class="bi bi-building"></i></div>
                        <div class="message-content text-secondary d-flex align-items-center">
                            <div style="width: 50px; height: 50px;">
                                ${loaderHTML}
                            </div>
                            <span class="ms-2 fs-7">Castor is thinking...</span>
                        </div>
                    </div>
                `;

            // Append to list and scroll
            // Note: This content gets overwritten when the real HTMX response arrives
            chatContainer.insertAdjacentHTML('beforeend', optimisticHTML);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Clear input
            input.value = '';
            input.style.height = 'auto';
            input.style.overflowY = 'hidden';
        });

        // 5. After Swap: Scroll to bottom again to show the real response
        form.addEventListener('htmx:afterSwap', function() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
            input.focus();
        });

        // 6. Error Handling
        form.addEventListener('htmx:responseError', function() {
            alert("Connection lost. Please try again.");
        });
    })();
</script>
