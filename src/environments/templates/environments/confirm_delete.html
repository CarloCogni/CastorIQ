<!--confirm_delete.html-->
{% extends "core/base.html" %}

{% block title %}Confirm Delete - Castor{% endblock %}

{% block content %}

<div class="flex-grow-1 d-flex align-items-center justify-content-center p-4">
    <div style="width: 100%; max-width: 450px;">
        <div class="card bg-surface border-danger">
            <div class="card-header border-danger bg-danger bg-opacity-10 text-danger fw-semibold d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-triangle-fill"></i>
                Confirm Deletion
            </div>
            <div class="card-body p-4">
                <h5 class="card-title mb-3">{{ title|default:"Delete Item" }}</h5>
                <p class="card-text text-secondary mb-4">
                    {{ message|default:"Are you sure you want to delete this item? This action cannot be undone." }}
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ cancel_url|default:request.META.HTTP_REFERER }}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash3 me-2"></i>Delete Permanently
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
