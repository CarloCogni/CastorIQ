<!doctype html>
<!--
  static/errors/503.html — served by nginx when the upstream signals
  Service Unavailable (planned maintenance, overload protection).
  No auto-refresh — 503 typically means "we will be back when we say so",
  not "blink and we'll be there".
-->
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>CastorIQ is unavailable — 503</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --castor-primary: #3b82f6;
            --castor-blue-light: #4facfe;
            --castor-blue-cyan: #00f2fe;
            --castor-accent: #8b5cf6;
            --castor-bg: #050505;
            --castor-text: #e7e7e7;
            --castor-text-muted: #a4a6ab;
            --castor-text-faint: #6b7076;
            --castor-border: #1f2024;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body {
            background: var(--castor-bg);
            color: var(--castor-text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
        }
        .shell {
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 2rem 1.25rem 5rem;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .logo {
            height: 56px;
            margin-bottom: 1.25rem;
            animation: bob 4s ease-in-out infinite;
            filter: drop-shadow(0 4px 18px rgba(79, 172, 254, 0.30));
        }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-7px); }
        }
        .code {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(6rem, 18vw, 11rem);
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -0.05em;
            margin: 0;
            background: linear-gradient(90deg, var(--castor-blue-light) 0%, var(--castor-blue-cyan) 25%, var(--castor-accent) 50%, var(--castor-blue-cyan) 75%, var(--castor-blue-light) 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 6s linear infinite;
        }
        @keyframes shimmer {
            0%   { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .title { font-size: clamp(1.4rem, 3vw, 1.85rem); font-weight: 600; margin: 1.25rem 0 0.6rem; letter-spacing: -0.01em; }
        .message { color: var(--castor-text-muted); max-width: 540px; margin: 0 auto 2rem; font-size: 1.05rem; }
        .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.45rem;
            padding: 0.65rem 1.5rem; border-radius: 10px;
            font-weight: 500; font-size: 0.95rem; text-decoration: none;
            border: 1px solid transparent; cursor: pointer; font-family: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }
        .btn-primary { background: var(--castor-primary); color: #fff; border-color: var(--castor-primary); }
        .btn-primary:hover { background: #2563eb; border-color: #2563eb; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35); }
        .footer { position: fixed; bottom: 1rem; left: 0; right: 0; text-align: center; font-size: 0.8rem; color: var(--castor-text-faint); }
        .wordmark { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; display: inline-flex; align-items: baseline; }
        .wordmark .prefix { font-weight: 700; background: linear-gradient(90deg, #fff 0%, var(--castor-blue-light) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .wordmark .iq { font-weight: 800; color: var(--castor-blue-cyan); letter-spacing: -0.04em; margin-left: 0.04em; }
        @media (prefers-reduced-motion: reduce) {
            .shell, .logo, .code { animation: none; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <img src="/static/images/castor-logo-nobg.png" alt="" class="logo">
        <h1 class="code">503</h1>
        <h2 class="title">CastorIQ is temporarily unavailable</h2>
        <p class="message">
            We're either doing scheduled maintenance or shedding load to keep things
            stable. Try again in a few minutes.
        </p>
        <div class="actions">
            <button class="btn btn-primary" onclick="window.location.reload()">Try again</button>
        </div>
    </main>
    <footer class="footer">
        <span class="wordmark"><span class="prefix">Castor</span><span class="iq">IQ</span></span>
    </footer>
</body>
</html>
