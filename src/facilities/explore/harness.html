<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore — Castor host harness</title>
  <style>
    *{box-sizing:border-box;}
    body{font-family:ui-monospace,monospace;background:#11121a;color:#e2e3ef;margin:0;display:flex;height:100vh;}
    .left{width:300px;flex-shrink:0;padding:14px;border-right:1px solid #2e2f42;display:flex;flex-direction:column;gap:7px;overflow:auto;}
    .right{flex:1;display:flex;flex-direction:column;min-width:0;}
    iframe{flex:1;border:0;width:100%;background:#1c1d28;}
    button{background:#20212e;border:1px solid #383950;color:#e2e3ef;padding:7px 10px;border-radius:5px;cursor:pointer;text-align:left;font-family:inherit;font-size:12px;}
    button:hover{background:#252637;}
    h1{font-size:13px;margin:0 0 4px;color:#4fc4cf;}
    .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#9294ab;margin-top:8px;}
    #log{flex:0 0 190px;background:#0a0b12;border-top:1px solid #2e2f42;padding:8px 10px;overflow:auto;font-size:11px;white-space:pre-wrap;line-height:1.5;}
    .in{color:#42b880;} .out{color:#4fc4cf;} .err{color:#e05858;} .sys{color:#9294ab;}
  </style>
</head>
<body>
  <div class="left">
    <h1>Castor host (test harness)</h1>
    <div class="sys" id="status">waiting for VIEWER_READY…</div>

    <div class="lbl">Handshake</div>
    <button onclick="send({type:'VIEWER_INIT', floorId:'JR-4F', requestId:rid()})">VIEWER_INIT (manual)</button>

    <div class="lbl">Focus</div>
    <button onclick="send({type:'FOCUS_ELEMENT', id:'1aB7zT$E1B0xfa4A', requestId:rid()})">FOCUS_ELEMENT · valid (Office 4A)</button>
    <button onclick="send({type:'FOCUS_ELEMENT', id:'NOPE-123', requestId:rid()})">FOCUS_ELEMENT · invalid</button>

    <div class="lbl">State / floors</div>
    <button onclick="send({type:'GET_STATE', requestId:rid()})">GET_STATE</button>
    <button onclick="send({type:'SET_FLOORS', floors:[{name:'1F', label:'IFC-derived · 1F', plan:'./assets/plans/floor-2.svg'}], requestId:rid()})">SET_FLOORS · add 1F</button>

    <div class="lbl">Theme</div>
    <button onclick="send({type:'SET_THEME', theme:'light', requestId:rid()})">SET_THEME · light</button>
    <button onclick="send({type:'SET_THEME', theme:'dark', requestId:rid()})">SET_THEME · dark</button>

    <div class="lbl">Errors</div>
    <button onclick="send({type:'WAT', requestId:rid()})">Unknown type (expect ERROR)</button>

    <div class="lbl">Log</div>
    <button onclick="document.getElementById('log').textContent=''">clear log</button>
  </div>

  <div class="right">
    <iframe id="explore" src="./index.html"></iframe>
    <div id="log"></div>
  </div>

  <script>
    const iframe = document.getElementById("explore");
    const logEl = document.getElementById("log");
    const statusEl = document.getElementById("status");
    let n = 0;
    const rid = () => "r" + (++n);

    function log(dir, obj) {
      const cls = dir === "←" ? (obj.type === "ERROR" ? "err" : "in") : "out";
      const span = document.createElement("span");
      span.className = cls;
      span.textContent = dir + " " + JSON.stringify(obj) + "\n";
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function send(msg) {
      log("→", msg);
      iframe.contentWindow.postMessage(msg, "*");
    }

    window.addEventListener("message", (e) => {
      if (e.source !== iframe.contentWindow) return;
      const d = e.data;
      if (!d || d.source !== "fm-explore") return;
      log("←", d);
      if (d.type === "VIEWER_READY") {
        statusEl.textContent = "VIEWER_READY · capabilities: " + (d.capabilities || []).join(", ");
        // auto-handshake
        send({ type: "VIEWER_INIT", floorId: "JR-4F", requestId: rid() });
      }
    });
  </script>
</body>
</html>
