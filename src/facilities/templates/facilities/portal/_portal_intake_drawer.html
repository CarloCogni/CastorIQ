<!-- facilities/portal/_portal_intake_drawer.html — Occupant Portal intake drawer -->

<div class="card shadow-sm border" id="portal-intake-drawer"
     style="border-color: rgba(20,184,166,0.45) !important;">
    <div class="card-body">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <p class="fs-6 fw-semibold mb-0">
                <i class="bi bi-pencil-square me-2" style="color: var(--castor-facilities, #14b8a6);"></i>
                Tell us what you need
            </p>
            <button type="button"
                    class="btn btn-link text-secondary p-0"
                    aria-label="Close"
                    hx-get=""
                    hx-trigger="click"
                    onclick="document.getElementById('portal-intake-mount').innerHTML = ''; return false;">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <form hx-post="{% url 'facilities:portal_intake' project.pk %}"
              hx-target="#portal-intake-mount"
              hx-swap="innerHTML"
              autocomplete="off">
            {% csrf_token %}

            <label for="portal-intake-textarea" class="form-label fs-7 text-secondary">
                What's wrong, or what do you need? Speak freely — we'll classify it.
            </label>
            <textarea id="portal-intake-textarea"
                      name="user_message"
                      class="form-control"
                      rows="4"
                      maxlength="2000"
                      placeholder="e.g. Meeting Room 3-B is cold."
                      required
                      autofocus
                      style="font-size: 1rem;">{{ user_message }}</textarea>

            {% if form_error %}
                <p class="fs-8 text-danger mt-2 mb-0">
                    <i class="bi bi-exclamation-triangle me-1"></i>{{ form_error }}
                </p>
            {% endif %}

            <div class="d-flex justify-content-end gap-2 mt-3">
                <button type="submit"
                        class="btn btn-sm"
                        style="background-color: var(--castor-facilities, #14b8a6); color: white; min-height: 44px; padding: 0.5rem 1.25rem;">
                    <i class="bi bi-magic me-2"></i>Draft request
                </button>
            </div>
        </form>
    </div>
</div>
