<!-- facilities/components/facilities_subnav.html — sub-tabs inside the Facilities tab -->

<div class="border-bottom flex-shrink-0"
     style="background-color: var(--bs-body-bg);">
    <nav class="d-flex align-items-center gap-1 px-4 overflow-x-auto"
         aria-label="Facilities sub-navigation">

        <a href="{% url 'facilities:tab' project.pk %}"
           class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-decoration-none flex-shrink-0 {% if active_sub_tab == 'dashboard' or not active_sub_tab %}fw-semibold{% else %}text-secondary{% endif %}"
           style="{% if active_sub_tab == 'dashboard' or not active_sub_tab %}color: var(--castor-facilities, #14b8a6); border-bottom: 2px solid var(--castor-facilities, #14b8a6);{% else %}border-bottom: 2px solid transparent;{% endif %}">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
        </a>

        <a href="{% url 'facilities:assets_list' project.pk %}"
           class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-decoration-none flex-shrink-0 {% if active_sub_tab == 'assets' %}fw-semibold{% else %}text-secondary{% endif %}"
           style="{% if active_sub_tab == 'assets' %}color: var(--castor-facilities, #14b8a6); border-bottom: 2px solid var(--castor-facilities, #14b8a6);{% else %}border-bottom: 2px solid transparent;{% endif %}">
            <i class="bi bi-grid-3x3-gap"></i>
            <span>Assets</span>
        </a>

        <!-- Deferred sub-tabs — surfaced as disabled placeholders so the information architecture is visible. -->
        <span class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-muted flex-shrink-0" style="border-bottom: 2px solid transparent; opacity: 0.55; cursor: not-allowed;" title="Spaces — coming soon"><i class="bi bi-lock"></i><span>Spaces</span></span>
        <span class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-muted flex-shrink-0" style="border-bottom: 2px solid transparent; opacity: 0.55; cursor: not-allowed;" title="Work orders — M3"><i class="bi bi-lock"></i><span>Work</span></span>
        <span class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-muted flex-shrink-0" style="border-bottom: 2px solid transparent; opacity: 0.55; cursor: not-allowed;" title="Maintenance — M5"><i class="bi bi-lock"></i><span>Maintenance</span></span>
        <span class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-muted flex-shrink-0" style="border-bottom: 2px solid transparent; opacity: 0.55; cursor: not-allowed;" title="Systems — Phase 2"><i class="bi bi-lock"></i><span>Systems</span></span>
        <span class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-muted flex-shrink-0" style="border-bottom: 2px solid transparent; opacity: 0.55; cursor: not-allowed;" title="Sensors — Phase 3"><i class="bi bi-lock"></i><span>Sensors</span></span>
        <span class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-muted flex-shrink-0" style="border-bottom: 2px solid transparent; opacity: 0.55; cursor: not-allowed;" title="Documents — M6"><i class="bi bi-lock"></i><span>Documents</span></span>
        <span class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-muted flex-shrink-0" style="border-bottom: 2px solid transparent; opacity: 0.55; cursor: not-allowed;" title="People — Phase 2"><i class="bi bi-lock"></i><span>People</span></span>
        <span class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-muted flex-shrink-0" style="border-bottom: 2px solid transparent; opacity: 0.55; cursor: not-allowed;" title="Costs — M8"><i class="bi bi-lock"></i><span>Costs</span></span>
        <span class="d-inline-flex align-items-center gap-2 px-3 py-2 fs-8 text-muted flex-shrink-0" style="border-bottom: 2px solid transparent; opacity: 0.55; cursor: not-allowed;" title="Reports — M7"><i class="bi bi-lock"></i><span>Reports</span></span>
    </nav>
</div>
