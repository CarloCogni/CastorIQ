<!-- facilities/components/role_switcher.html — navbar pill + dropdown of active roles -->

{% if facilities_roles %}
<div class="dropdown">
    <button class="btn btn-sm rounded-pill px-3 py-1 dropdown-toggle d-flex align-items-center gap-2"
            type="button"
            id="facilities-role-pill"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            style="background-color: rgba(20, 184, 166, 0.15); color: var(--castor-facilities, #14b8a6); border: 1px solid rgba(20, 184, 166, 0.35); font-weight: 600;">
        <i class="bi bi-person-badge"></i>
        {% if facilities_active_role %}
            {{ facilities_active_role.get_role_display }}
        {% else %}
            No role
        {% endif %}
    </button>

    <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="facilities-role-pill">
        {% for role in facilities_roles %}
            <li>
                <form method="post"
                      action="{% url 'facilities:role_switch' project.pk %}"
                      hx-post="{% url 'facilities:role_switch' project.pk %}"
                      hx-target="#facilities-tab-body"
                      hx-swap="outerHTML"
                      class="m-0">
                    {% csrf_token %}
                    <input type="hidden" name="role_id" value="{{ role.id }}">
                    <button type="submit"
                            class="dropdown-item d-flex align-items-center gap-2 {% if facilities_active_role and role.id == facilities_active_role.id %}active{% endif %}">
                        <i class="bi bi-person-badge"></i>
                        <span>{{ role.get_role_display }}</span>
                        {% if facilities_active_role and role.id == facilities_active_role.id %}
                            <i class="bi bi-check2 ms-auto"></i>
                        {% endif %}
                    </button>
                </form>
            </li>
        {% endfor %}
    </ul>
</div>
{% elif facilities_is_implicit_owner %}
<a href="{% url 'projects:people' project.pk %}"
   class="badge rounded-pill fs-8 text-decoration-none d-inline-flex align-items-center gap-1"
   style="background-color: rgba(59, 130, 246, 0.15); color: var(--castor-blue, #3b82f6); border: 1px solid rgba(59, 130, 246, 0.35); font-weight: 600;"
   title="You're the project owner — viewing the Facilities Manager dashboard by default. Click to assign yourself a specific role.">
    <i class="bi bi-shield-lock"></i>
    <span>Project Owner &mdash; implicit view</span>
</a>
{% else %}
<span class="badge rounded-pill fs-8"
      style="background-color: rgba(148, 163, 184, 0.15); color: var(--bs-secondary-color); border: 1px solid var(--bs-border-color); font-weight: 500;">
    <i class="bi bi-person-slash me-1"></i>No facility roles assigned
</span>
{% endif %}
