<!-- facilities/components/dashboards/_asset_count_card.html — live asset count linking to the Assets sub-tab -->

<div class="col-12 col-md-6 col-lg-4">
    <a href="{% url 'facilities:assets_list' project.pk %}"
       class="text-decoration-none h-100 d-block"
       style="color: inherit;">
        <div class="p-3 rounded border d-flex flex-column gap-2 h-100"
             style="background-color: var(--bs-body-bg); border-color: var(--castor-facilities, #14b8a6) !important;">

            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-grid-3x3-gap fs-5" style="color: var(--castor-facilities, #14b8a6);"></i>
                <span class="fw-semibold">Tracked assets</span>
            </div>

            <div class="flex-grow-1 d-flex align-items-center justify-content-center py-2">
                <span class="display-6 m-0" style="color: var(--castor-facilities, #14b8a6);">
                    {{ facilities_open_asset_count|default:0 }}
                </span>
            </div>

            <div class="fs-8 text-secondary border-top pt-2 d-flex align-items-center gap-1">
                <i class="bi bi-arrow-right"></i>
                <span>Open the asset register</span>
            </div>
        </div>
    </a>
</div>
