<!-- facilities/components/dashboards/_placeholder_card.html — widget stub ("coming in milestone X") -->

<div class="col-12 col-md-6 col-lg-4">
    <div class="p-3 rounded border d-flex flex-column gap-2 h-100"
         style="background-color: var(--bs-tertiary-bg); border-color: var(--bs-border-color) !important;">

        <div class="d-flex align-items-center gap-2 text-secondary">
            <i class="bi bi-{{ icon }} fs-5" style="color: var(--castor-facilities, #14b8a6);"></i>
            <span class="fw-semibold">{{ title }}</span>
        </div>

        <div class="flex-grow-1 d-flex align-items-center justify-content-center py-3"
             style="color: var(--bs-secondary-color);">
            <span class="fs-8 text-uppercase" style="letter-spacing: 0.05em;">Coming soon</span>
        </div>

        <div class="fs-8 text-secondary border-top pt-2">
            <i class="bi bi-rocket-takeoff me-1"></i>{{ hint }}
        </div>
    </div>
</div>
