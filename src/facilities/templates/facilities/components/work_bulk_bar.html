<!-- facilities/components/work_bulk_bar.html — sticky bulk-action toolbar -->

<div id="work-bulk-bar"
     class="position-fixed bottom-0 start-50 translate-middle-x d-none shadow-lg rounded-3 p-3 border"
     style="z-index: 1040; max-width: 820px; background-color: var(--bs-body-bg);">
    <div class="d-flex align-items-center gap-3 flex-wrap">
        <div class="fs-7 fw-semibold">
            <span id="work-bulk-count">0</span> selected
        </div>

        <form class="d-flex align-items-center gap-1 work-bulk-form" method="post"
              action="{% url 'facilities:work_bulk' project.pk %}">
            {% csrf_token %}
            <input type="hidden" name="action" value="set_priority">
            <select name="priority" class="form-select form-select-sm" style="width: 130px;">
                <option value="1">P1 — Critical</option>
                <option value="2">P2 — High</option>
                <option value="3" selected>P3 — Normal</option>
                <option value="4">P4 — Low</option>
                <option value="5">P5 — Backlog</option>
            </select>
            <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-flag"></i> Set priority</button>
        </form>

        <form class="d-flex align-items-center gap-1 work-bulk-form" method="post"
              action="{% url 'facilities:work_bulk' project.pk %}">
            {% csrf_token %}
            <input type="hidden" name="action" value="assign">
            <input type="text" name="assignee_vendor" class="form-control form-control-sm"
                   placeholder="Vendor name" style="width: 160px;">
            <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-person-check"></i> Assign</button>
        </form>

        <form class="d-flex align-items-center gap-1 work-bulk-form" method="post"
              action="{% url 'facilities:work_bulk' project.pk %}">
            {% csrf_token %}
            <input type="hidden" name="action" value="cancel">
            <button type="submit" class="btn btn-sm btn-outline-danger"
                    onclick="return confirm('Cancel the selected work orders?');">
                <i class="bi bi-x-lg"></i> Cancel
            </button>
        </form>
    </div>
</div>
