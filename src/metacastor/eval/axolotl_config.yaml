# metacastor/eval/axolotl_config.yaml
# ---------------------------------------------------------------------------
# QLoRA fine-tuning config for MetaCastor (Deliverable 4).
#
# This file is checked into the repo but executed on a cloud GPU host
# (RunPod / vast.ai / Lambda Labs). The `dataset_path` below is relative
# to the Axolotl run directory on the GPU host — NOT relative to this file.
# Copy `training_export.jsonl` (produced by `export_training_data`) into
# `./data/` on the GPU host before launching training.
#
# Base model is pinned to Meta-Llama-3.1-8B-Instruct because Castor's
# production Ollama backend runs llama3.1:8b (see metacastor/eval/run_eval.py
# EVAL_MODEL). Training a different base would invalidate any D1/D2 eval
# comparisons. Change the base model only as a deliberate, documented
# experiment.
#
# Manual pipeline and expected outputs are in docs/metacastor/d4-finetuning-pipeline.md.
# ---------------------------------------------------------------------------

base_model: meta-llama/Meta-Llama-3.1-8B-Instruct
model_type: LlamaForCausalLM

load_in_4bit: true
adapter: qlora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

datasets:
  - path: data/training_export.jsonl
    type: alpaca          # instruction / input / output schema
    ds_type: json

sequence_len: 4096
micro_batch_size: 2
num_epochs: 3
learning_rate: 2e-4

output_dir: ./qlora-out
