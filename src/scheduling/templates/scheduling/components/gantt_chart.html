<!-- scheduling/components/gantt_chart.html — Gantt chart DOM skeleton (populated by gantt.html JS) -->
<div id="gantt-scroll" style="overflow:auto; max-height:58vh;">
    <div id="gantt-chart" style="position:relative; display:inline-flex; flex-direction:column; min-width:100%;">

        <!-- Sticky header row -->
        <div id="gantt-header-row"
             style="position:sticky; top:0; z-index:4; display:flex; align-items:stretch;
                    border-bottom:1px solid var(--bs-border-color); background:var(--bs-body-bg); height:28px;">
            <div class="gantt-label-cell"
                 style="z-index:6; font-size:0.73rem; color:var(--bs-secondary-color); align-items:center; display:flex;">
                Task
            </div>
            <div id="gantt-header-tl" style="position:relative; height:28px; flex:1;"></div>
        </div>

        <!-- Background overlay: weekends + today marker (z-index:0, pointer-events:none) -->
        <div id="gantt-bg-overlay"
             style="position:absolute; top:28px; left:220px; bottom:0;
                    pointer-events:none; z-index:0; overflow:hidden;"></div>

        <!-- Task rows container -->
        <div id="gantt-body" style="position:relative; z-index:1;">
            <div id="gantt-loading"
                 class="d-flex align-items-center justify-content-center text-secondary py-4"
                 style="min-width:400px;">
                <div class="spinner-border spinner-border-sm me-2"></div>Loading…
            </div>
        </div>

    </div>
</div>
