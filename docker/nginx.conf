# docker/nginx.conf — Castor production reverse proxy.
#
# One vhost: castoriq.io + www.castoriq.io. Port 80 serves ACME challenges
# (so certbot --webroot renewals work) and redirects everything else to 443.
# Port 443 terminates SSL and proxies to the Daphne container, with WebSocket
# upgrade support for the Modify pipeline.
#
# Certs are mounted from the host (see docker-compose.prod.yml: LETSENCRYPT_DIR).
# For local dry-runs without real certs, run scripts/generate-local-certs.sh
# first to populate ./tmp/letsencrypt with self-signed certs.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # WebSocket upgrade map — used by the Modify pipeline's ProposalConsumer.
    # `Connection: upgrade` only fires when the client requested an Upgrade.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Generous request body — IFC uploads can be tens of MB.
    client_max_body_size 50M;

    # Compression for text-y responses. WhiteNoise pre-compresses static assets,
    # so this catches dynamic responses + anything WhiteNoise didn't pre-gzip.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Logging — JSON-ish format makes it easy to grep cost-relevant patterns
    # later (e.g. WS upgrade volume, /healthz/ noise).
    log_format castor '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time uct=$upstream_connect_time '
                     'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log castor;
    error_log  /var/log/nginx/error.log warn;

    upstream castor_web {
        server web:8000;
        keepalive 32;
    }

    # ── Port 80: ACME challenges + HTTPS redirect ──────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name castoriq.io www.castoriq.io;

        # Certbot's --webroot plugin drops challenge files here. Must be
        # reachable over plain HTTP for renewal to succeed.
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Port 443: SSL termination + proxy to Daphne ────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name castoriq.io www.castoriq.io;

        ssl_certificate     /etc/letsencrypt/live/castoriq.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/castoriq.io/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS is also asserted by Django (production.py SECURE_HSTS_*) — this
        # is the belt-and-braces version for direct nginx hits that bypass
        # Django (e.g. /static/, /media/).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Static + media served direct from the volumes the web container
        # populated at build (collectstatic) and at runtime. Far-future cache
        # is safe because WhiteNoise's manifest storage hashes filenames.
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Healthz: cheap, frequent — turn off access logging.
        location = /healthz/ {
            proxy_pass http://castor_web;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            access_log off;
        }

        location / {
            proxy_pass http://castor_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;

            # WebSocket upgrade for the Modify pipeline (writeback consumers).
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Long enough for Tier 3 LLM round-trips; short enough that a
            # genuinely hung request doesn't pin a worker indefinitely.
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
            proxy_connect_timeout 10s;
        }

        # ── Branded error pages for upstream failures ──────────────────────
        # When Daphne is unreachable (502), too slow (504), or otherwise
        # unavailable (503), serve branded static HTML directly from the
        # shared static volume instead of nginx's default error page.
        #
        # `proxy_intercept_errors` is intentionally LEFT OFF (default).
        # That means Django's own 4xx/5xx responses (with their own branded
        # templates from core/templates/errors/) pass through unchanged —
        # only nginx-originated errors trigger these.
        #
        # 404 covers nginx-originated misses under alias-served locations
        # (/media/, /static/) — those never reach Daphne, so Django's own
        # handler404 cannot fire. Django-originated 404s still pass through
        # unchanged because proxy_intercept_errors is off.
        error_page 404 /__errors/404.html;
        error_page 502 /__errors/502.html;
        error_page 503 /__errors/503.html;
        error_page 504 /__errors/504.html;

        location ^~ /__errors/ {
            internal;
            alias /app/staticfiles/errors/;
        }
    }
}
