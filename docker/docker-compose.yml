name: castor

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: castor-dev-db
    environment:
      POSTGRES_USER: castor
      POSTGRES_PASSWORD: castor
      POSTGRES_DB: castor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U castor -d castor"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: castor-dev-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@castor.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - db


volumes:
  postgres_data:
