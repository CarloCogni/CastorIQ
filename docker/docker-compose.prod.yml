# Production stack: Daphne + Postgres (pgvector) + nginx.
# Ollama lives outside the compose stack — either on the same host (via
# OLLAMA_HOST=http://host.docker.internal:11434 with extra_hosts) or as its own
# container managed separately. This keeps embedding model storage off the
# Castor image.

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: castor-web
    # `unless-stopped` re-launches Daphne after a worker crash without
    # racing back up if the operator deliberately stopped the stack. Without
    # this, a Daphne segfault leaves the WS surface dark until manual SSH
    # intervention — invisible to ErrorLog and to UptimeRobot's HTTP probe.
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    env_file:
      - ../.env
    # No host port binding: nginx is the only public ingress. To probe Daphne
    # directly during a local dry-run, use `docker compose exec web curl
    # http://127.0.0.1:8000/healthz/`.
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    extra_hosts:
      # Lets the container reach Ollama running on the Docker host (Linux too,
      # since Docker 20.10+). Override with OLLAMA_HOST in .env if Ollama is
      # itself containerised.
      - "host.docker.internal:host-gateway"
    # Healthcheck pings the in-container /healthz/ endpoint — DB + Ollama
    # reachability. ``start_period`` gives the worker time to import the
    # full Django app graph on cold boot before the first probe lands.
    # nginx + UptimeRobot still hit /healthz/ from the outside; this layer
    # is what tells the runtime to mark the container unhealthy and restart.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: pgvector/pgvector:pg16
    container_name: castor-db
    # env_file mirrors `web` so we don't depend on compose's variable
    # substitution finding `.env` next to the compose file. The Postgres
    # image only consumes POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
    # from the injected env; the rest are inert here.
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      # ${POSTGRES_USER:-castor} / ${POSTGRES_DB:-castor} fall back to the
      # default values from .env.production.example so the healthcheck shell
      # works even before compose substitution lands.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-castor} -d $${POSTGRES_DB:-castor}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: castor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      # Certs come from the host's certbot. Override LETSENCRYPT_DIR for local
      # dry-runs (e.g. ./tmp/letsencrypt with self-signed certs).
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      # Webroot for ACME challenges (certbot --webroot renewals).
      - ${ACME_WEBROOT:-./tmp/acme-webroot}:/var/www/acme:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
